<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <filter id="magicGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="wandGradient" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2c1a10"/>
      <stop offset="30%" stop-color="#4a2e1b"/>
      <stop offset="70%" stop-color="#7a4b2c"/>
      <stop offset="100%" stop-color="#2c1a10"/>
    </linearGradient>
    <linearGradient id="woodTexture" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#110804"/>
      <stop offset="40%" stop-color="#3d1f11"/>
      <stop offset="60%" stop-color="#693b22"/>
      <stop offset="100%" stop-color="#211008"/>
    </linearGradient>
  </defs>

  <!-- Wand shadow for depth -->
  <path d="M6 6 L44 44" stroke="rgba(0,0,0,0.4)" stroke-width="3" stroke-linecap="round" transform="translate(1, 1)"/>

  <!-- Main shaft -->
  <path d="M5 5 L43 43" stroke="url(#wandGradient)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Texture line -->
  <path d="M6 6 L42 42" stroke="url(#woodTexture)" stroke-width="1" stroke-linecap="round"/>

  <!-- The 6 nodes of the Elder Wand (bottom to top) -->
  <!-- Base handle cone -->
  <path d="M42 42 L46 46 L40 46 Z" fill="url(#woodTexture)" transform="rotate(45 43 43)"/>
  <circle cx="43" cy="43" r="3" fill="url(#wandGradient)"/>
  <ellipse cx="43" cy="43" r="1.5" fill="#110804"/>

  <!-- Node 1 (biggest) -->
  <ellipse cx="37" cy="37" rx="3.5" ry="2.5" fill="url(#wandGradient)" transform="rotate(-45 37 37)"/>
  <ellipse cx="37" cy="37" rx="2" ry="1.5" fill="url(#woodTexture)" transform="rotate(-45 37 37)"/>
  <!-- Pitting -->
  <circle cx="36" cy="37" r="0.5" fill="#110804"/>
  <circle cx="38" cy="36" r="0.4" fill="#110804"/>

  <!-- Node 2 -->
  <ellipse cx="30" cy="30" rx="3" ry="2" fill="url(#wandGradient)" transform="rotate(-45 30 30)"/>
  <ellipse cx="30" cy="30" rx="1.5" ry="1" fill="url(#woodTexture)" transform="rotate(-45 30 30)"/>
  <circle cx="29.5" cy="30" r="0.5" fill="#110804"/>

  <!-- Node 3 -->
  <ellipse cx="24" cy="24" rx="2.5" ry="1.8" fill="url(#wandGradient)" transform="rotate(-45 24 24)"/>
  <ellipse cx="24" cy="24" rx="1.5" ry="1" fill="url(#woodTexture)" transform="rotate(-45 24 24)"/>

  <!-- Node 4 -->
  <ellipse cx="19" cy="19" rx="2.2" ry="1.5" fill="url(#wandGradient)" transform="rotate(-45 19 19)"/>
  
  <!-- Node 5 -->
  <ellipse cx="15" cy="15" rx="1.8" ry="1.2" fill="url(#wandGradient)" transform="rotate(-45 15 15)"/>
  
  <!-- Node 6 (smallest) -->
  <ellipse cx="11" cy="11" rx="1.5" ry="1" fill="url(#wandGradient)" transform="rotate(-45 11 11)"/>

  <!-- Magic tip glow -->
  <circle cx="4" cy="4" r="3" fill="#a8e6cf" opacity="0.6" filter="url(#magicGlow)"/>
  <circle cx="4" cy="4" r="1.5" fill="#ffffff" filter="url(#magicGlow)"/>
  <circle cx="4" cy="4" r="0.8" fill="#ffffff"/>
</svg>